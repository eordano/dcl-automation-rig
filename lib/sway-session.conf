# =============================================================================
# sway-session.conf — config for the nested, headless sway used by the web-stack
# rig. Loaded by lib/headless-display.sh inside bubblewrap. Override the path
# with DCL_SWAY_CONF. Keep it minimal: this compositor exists only to give
# headless chromium a real surface + Xwayland display that wayvnc can export.
#
# ADAPTED from the Unity rig's conf: the only change is the comments — the
# subject is chromium (running the wasm bundle + the React HUD), not Unity/Wine.
# The GPU requirement is enforced in headless-display.sh (DCL_WLR_RENDERER=gles2),
# not here.
# =============================================================================

# Single virtual 1080p output. The headless wlroots backend creates HEADLESS-1.
output HEADLESS-1 mode 1920x1080 position 0 0

# Force Xwayland: chromium runs --ozone-platform=x11 onto it. The WebGPU/Vulkan
# + DRI3 presentation path through Xwayland is the proven one here; chromium's
# native wayland path is flakier for the GPU canvas.
xwayland force

# No chrome — we want a clean framebuffer for screenshots/VNC.
default_border none
default_floating_border none
hide_edge_borders smart

# Export the surface over VNC. Port/bind come from the env (set by the launcher).
exec wayvnc --output=HEADLESS-1 --max-fps=20 ${DCL_VNC_BIND:-localhost} ${DCL_VNC_PORT:-5913}

# --- Convenience keybindings (Mod4 = Super) ----------------------------------
# grim/foot aren't on sway's PATH inside the bwrap, so launch them via nix-shell.
bindsym Mod4+Return  exec nix-shell -p foot --run foot
bindsym Mod4+s       exec nix-shell -p grim --run "grim /tmp/sway-$(date +%H%M%S).png"
bindsym Mod4+q       kill
bindsym Mod4+r       reload
bindsym Mod4+Shift+q exec swaymsg exit
